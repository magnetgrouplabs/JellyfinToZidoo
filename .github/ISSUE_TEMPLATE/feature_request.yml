name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have searched the [existing issues](https://github.com/magnetgrouplabs/JellyfinToZidoo/issues) and confirmed this has not already been requested
          required: true
        - label: I have redacted any personal information from this request
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you would like to see
      placeholder: What would you like JellyfinToZidoo to do?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why would this feature be useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other relevant details, mockups, or references
    validations:
      required: false
